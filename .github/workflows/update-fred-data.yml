name: Update FRED data

# Refreshes data.json from FRED so the dashboard auto-updates on Vercel.
# Mirrors the Macro Monitor pipeline. Reuses the same FRED_API_KEY secret.

on:
  schedule:
    # Weekdays at 22:30 UTC — after the US session, when Treasury / ICE BofA OAS
    # series have posted for the day. (NFCI is weekly, released Wednesdays.)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write           # needed to commit the refreshed data.json

concurrency:
  group: fred-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --upgrade pandas requests numpy yfinance

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # honors observation_start → full 2018 history
        run: python fetch_fred.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data change — nothing to commit."
          else
            git commit -m "data: refresh FRED $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
